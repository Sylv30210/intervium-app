name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: intervium
          POSTGRES_PASSWORD: intervium_test
          POSTGRES_DB: intervium_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U intervium"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://intervium:intervium_test@localhost:5432/intervium_test
      JWT_SECRET: integration-test-jwt-secret-at-least-32-characters
      RUN_INTEGRATION_TESTS: "true"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
