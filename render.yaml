services:
  - type: web
    name: intervium
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: cd Backend && npm ci --omit=dev
    startCommand: cd Backend && npm start
    healthCheckPath: /api/health
    autoDeployTrigger: off
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: MIGRATION_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DB_POOL_MAX
        value: "10"
      - key: STORAGE_DRIVER
        value: cloudinary
      - key: CLOUDINARY_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: GMAIL_SENDING_ENABLED
        value: "true"
      - key: PUBLIC_REGISTRATION_ENABLED
        value: "false"
      - key: SENTRY_DSN
        sync: false
      - key: TOTP_ENCRYPTION_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: NEON_BACKUPS_CONFIRMED
        value: "false"
  - type: web
    name: intervium-staging
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: cd Backend && npm ci --omit=dev
    startCommand: cd Backend && npm start
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: MIGRATION_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: STORAGE_DRIVER
        value: cloudinary
      - key: CLOUDINARY_URL
        sync: false
      - key: PUBLIC_REGISTRATION_ENABLED
        value: "false"
      - key: SENTRY_DSN
        sync: false
      - key: TOTP_ENCRYPTION_KEY
        sync: false
      - key: APP_ENV
        value: staging
      - key: NEON_BACKUPS_CONFIRMED
        value: "false"
