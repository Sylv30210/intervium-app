services:
  - type: web
    name: intervium
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: cd Backend && npm ci --omit=dev
    startCommand: cd Backend && npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: MIGRATION_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DB_POOL_MAX
        value: "10"
      - key: STORAGE_DRIVER
        value: cloudinary
      - key: CLOUDINARY_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: REPORT_EMAIL_FROM
        sync: false
      - key: REPORT_EMAIL_ENABLED
        value: "false"
