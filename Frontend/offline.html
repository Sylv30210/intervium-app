<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Intervium — Hors connexion</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:24px;background:#f3f6fb;color:#182234;font-family:Inter,system-ui,sans-serif}.card{width:min(440px,100%);padding:28px;border:1px solid #dbe3ee;border-radius:20px;background:#fff;box-shadow:0 18px 50px #10233f18;text-align:center}svg{width:68px;color:#10233f}h1{margin:16px 0 8px}p{color:#64748b;line-height:1.5}button{min-height:48px;border:0;border-radius:12px;padding:12px 18px;background:#2563eb;color:#fff;font:inherit;font-weight:800;cursor:pointer}
  </style>
</head>
<body><main class="card">
  <svg viewBox="0 0 48 48" aria-hidden="true"><path d="M24 3.5 41 10v12.6c0 10.2-6.7 18.3-17 21.9C13.7 40.9 7 32.8 7 22.6V10L24 3.5Z" fill="currentColor" opacity=".2"/><path d="M24 5.8 38.5 11v11.6c0 8.5-5.4 15.4-14.5 18.9-9.1-3.5-14.5-10.4-14.5-18.9V11L24 5.8Z" fill="none" stroke="currentColor" stroke-width="3"/><path d="m16.4 23.8 5 5 10.8-11" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <h1>Intervium est hors connexion</h1>
  <p>L’interface reste accessible, mais les données sécurisées nécessitent une connexion au serveur.</p>
  <button id="retry">Réessayer</button>
</main><script>document.getElementById("retry").addEventListener("click",()=>location.reload());</script></body></html>
