<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f3f6fb">
    <meta name="application-name" content="Intervium">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Intervium">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/intervium-192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <title>Intervium</title>
    <script>
        try {
            const theme = localStorage.getItem("intervium_visual_theme");
            if (["glass", "dark"].includes(theme)) {
                document.documentElement.dataset.theme = theme;
                document.documentElement.classList.add(`theme-${theme}`);
                document.querySelector('meta[name="theme-color"]').content = theme === "dark" ? "#0b1120" : "#e9f1fb";
            }
        } catch {}
    </script>
</head>
<body>
    <div id="app" aria-live="polite"></div>
    <script src="/app.js" defer></script>
</body>
</html>
